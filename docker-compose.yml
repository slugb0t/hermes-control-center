services:
  web:
    image: node:24-bookworm-slim
    working_dir: /app
    command: sh -c "corepack enable && yarn install --frozen-lockfile && yarn dev:web --host 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    environment:
      - NUXT_PUBLIC_API_BASE=http://localhost:8787

  api:
    image: python:3.11-slim
    working_dir: /app/apps/api
    command: sh -c "pip install -r requirements-dev.txt && uvicorn app.main:app --host 0.0.0.0 --port 8787 --reload"
    ports:
      - "8787:8787"
    volumes:
      - .:/app
    environment:
      - HERMES_CONTROL_ALLOWED_ROOTS=/srv/syncthing/kb-private:/srv/syncthing/kb-shared
